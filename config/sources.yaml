# -----------------------------------------------------------------------------
# 2. EXCLUDED SAUDI-OWNED / CONTROLLED OUTLETS
#    (match domain OR parent; verify parent for neutral-named titles)
# -----------------------------------------------------------------------------
excluded_saudi:

  # --- SRMG (Saudi Research and Media Group; ultimate controlling party PIF) ---
  srmg_news:
    - aawsat.com            # Asharq Al-Awsat (+ English/Turkish/Persian/Urdu)
    - asharq.com            # Asharq News / Asharq Business w/ Bloomberg
    - arabnews.com          # Arab News (+ Français/Pakistan/Japan)
    - independentarabia.com # Independent Arabia (+ Turkish/Persian/Urdu)
    - majalla.com           # Al Majalla / The Majalla
    - akhbaar24.com
  srmg_economy:
    - aleqt.com             # Al Eqtisadiah
    - argaam.com            # Argaam
  srmg_sport:
    - arriyadiyah.com       # Arriyadhiah
    - sport24.co
  srmg_lifestyle:           # <-- the high-risk "invisible" set (neutral names)
    - hiamag.com            # Hia
    - sayidaty.net          # Sayidaty
    - abouther.com          # About Her
    - aljamila.com          # Aljamila
    - arrajol.com           # Arrajol
    - ahlanwasahlan.com     # Ahlan Wa Sahlan
    # Robb Report Arabia, LIST Magazine — verify current domains before add
  srmg_music_culture:
    # Billboard Arabia is SRMG-owned — EXCLUDE. Do not confuse with billboard.com
    - billboardarabia.com
    - mangaarabia.com       # Manga Arabia
    - thmanyah.com          # Thmanyah / Thamaniya (podcasts; SRMG raising stake)

  # --- MBC Group (PIF owns 54% since 18 Sep 2025) ---
  mbc_news:
    - alarabiya.net         # Al Arabiya — MBC/PIF-owned, Riyadh HQ. NOT permitted.
    - english.alarabiya.net
    - alhadath.net          # Al Hadath
  mbc_streaming_studios:
    - shahid.net            # Shahid / Shahid VIP
    # MBC Studios, MBC Talent — editorial channels treated as Saudi source

  # --- Rotana (Prince Alwaleed bin Talal / Kingdom Holding) ---
  rotana:
    - rotana.net

  # --- Royal-family / prince-owned press ---
  royal_family_press:
    - okaz.com.sa           # Okaz
    - saudigazette.com.sa   # Saudi Gazette (Okaz Organization)
    - alwatan.com.sa        # Al Watan
    # Al-Hayat (ceased 2020; archive may surface) — treat as Saudi-owned

  # --- Long-established Saudi dailies (press-establishment structures) ---
  saudi_dailies:
    - al-jazirah.com        # Al-Jazirah
    - alriyadh.com          # Al-Riyadh
    - al-madina.com         # Al-Madina
    - alyaum.com            # Al-Yaum
    - albiladdaily.com      # Al Bilad (Jeddah) — NOTE: separate Bahraini "Al Bilad"

  # --- Nominally private but state-aligned digital ---
  state_aligned_digital:
    - sabq.org              # Sabq

  # --- State broadcast / agency ---
  state_broadcast_agency:
    - spa.gov.sa            # Saudi Press Agency
    - sbc.sa                # Saudi Broadcasting Authority / SBC
    - ekhbariya.net         # Al-Ekhbariya
    # Al-Thaqafeya (culture channel, SRMG-managed) — treat as Saudi source

# -----------------------------------------------------------------------------
# 3. PERMITTED NON-SAUDI REGIONAL OUTLETS  (allowed)
# -----------------------------------------------------------------------------
permitted_regional:
  - thenationalnews.com     # The National (Abu Dhabi) — permitted
  - campaignme.com          # Campaign Middle East — permitted
  - newarab.com             # The New Arab / Al-Araby (Qatari-owned; non-Saudi)
  - middleeasteye.net       # Middle East Eye (non-Saudi)

# -----------------------------------------------------------------------------
# 4. PERMITTED BUT LOW-TRUST FOR SAUDI-GOVERNMENT-RELATED STORIES
#    (not Saudi-owned by parent, but run heavy Saudi promotional content)
# -----------------------------------------------------------------------------
low_trust_permitted:
  - voguearabia.com         # since Jan 2025 run directly by Condé Nast; Saudi-heavy readership
  - harpersbazaararabia.com # ITP Media Group (Dubai)
  - gqmiddleeast.com        # ITP Media Group
  - admiddleeast.com        # ITP Media Group
  - timeoutriyadh.com       # ITP / Time Out (promotional)

# -----------------------------------------------------------------------------
# NOTE ON CINEMA CHAINS (subjects vs. sources):
#   Muvi Cinemas (Fawaz Al Hokair Group) is SAUDI-OWNED -> its editorial/press
#   channels are a Saudi source, but the chain is a valid STORY SUBJECT.
#   VOX (Majid Al Futtaim / UAE) and AMC (US) are NOT Saudi.
#
# CAVEAT: ownership is dynamic. Re-verify parents quarterly (MBC 54% PIF completed
#   Sep 2025; SRMG Thmanyah stake 51%->75% announced May 2026; Vogue Arabia moved
#   to direct Condé Nast Jan 2025).
# =============================================================================

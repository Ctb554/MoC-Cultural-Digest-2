# =============================================================================
# MoC Daily Cultural Digest — SOURCE POOL
# =============================================================================
# Purpose:
#   1. global_sources  -> the pool of credible non-Saudi outlets to search for
#      the GLOBAL culture section (fixes the persistent Global-breadth shortfall)
#   2. excluded_saudi   -> outlets that must NEVER be used as a source, because
#      an entity in their ownership chain is Saudi state / PIF / royal family /
#      a Saudi media conglomerate. Match on domain AND on parent, not on name.
#   3. permitted_regional -> non-Saudi MENA outlets that ARE allowed
#   4. low_trust_permitted -> allowed but treat cautiously for Saudi-gov stories
#
# RULE OF THUMB (encode in SKILL.md too):
#   Ownership is a chain. Exclude a title if ANY parent / majority shareholder /
#   ultimate controlling party is a Saudi state entity, PIF, the royal family,
#   or a Saudi media conglomerate (SRMG, MBC, Rotana, SBC, Okaz Org., Aramco).
#   This holds regardless of the title's name, language, or city of publication
#   (many publish from London, Dubai or Cairo). For any lifestyle / fashion /
#   culture title with an Arabic or neutral-sounding name, VERIFY THE PARENT
#   before use.
# =============================================================================

# -----------------------------------------------------------------------------
